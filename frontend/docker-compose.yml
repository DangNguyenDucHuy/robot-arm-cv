version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keypoint-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - kp-net
    restart: unless-stopped

  backend:
    image: your-fastapi-image:latest        # ← replace with your image
    container_name: keypoint-backend
    expose:
      - "8000"
    networks:
      - kp-net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: keypoint-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - kp-net
    restart: unless-stopped

networks:
  kp-net:
    driver: bridge
